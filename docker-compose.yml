services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: 4000
      JWT_SECRET: super-secret-change-me
      JWT_EXPIRES_DAYS: 7
      DATABASE_PATH: /data/dailyroutine.db
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - dailyroutine_data:/data
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  dailyroutine_data:
